name: Atualizar Noticias - Voz Brasil

on:
  schedule:
    - cron: '0 11 */2 * *'
  workflow_dispatch:

jobs:
  atualizar-noticias:
    runs-on: ubuntu-latest
    name: Buscar RSS e Publicar

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Buscar noticias e gerar HTML
        run: python fetch_news.py

      - name: Commit do HTML atualizado
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Voz Brasil Bot"
          git add index.html
          git diff --staged --quiet || git commit -m "Noticias atualizadas"

      - name: Push para o repositorio
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
